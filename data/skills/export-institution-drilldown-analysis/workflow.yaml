id: export-institution
name: 出口机构下钻分析
description: 分析指定出口机构的到达和离开时间分布数据，生成分析总结PDF
data_file: "../data/寄递时限对标分析指标大全.xlsx"
env_requirements:
  - "node >= 14"
  - "npm install xlsx pdfkit"

steps:
  - id: step_1_read_data
    name: 读取48小时数据
    description: 从进口、出口处理及投递48小时Sheet中读取指定机构数据
    script: "analyze.js"
    language: nodejs
    args_template:
      - "${params.institution_name}"
      - "${params.route_name}"
    timeout: 60
    outputs:
      - name: pdf_report
        type: file
        value: "输出结果/出口机构下钻分析结果_${params.institution_name}.pdf"
      - name: arrive_peaks
        type: array
        value: "${step_1_read_data.output.arrive_peaks}"
      - name: leave_peaks
        type: array
        value: "${step_1_read_data.output.leave_peaks}"
      - name: bottleneck_analysis
        type: object
        value: "${step_1_read_data.output.bottleneck_analysis}"
